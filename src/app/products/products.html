<div class="shop-wrapper">
  
  <!-- Navigation Header -->
  <header class="navbar">
    <div class="logo">
      <div class="icon">🌸</div>
      <div class="text">
        <h1>{{ storeName }}</h1>
        <p>{{ tagline | uppercase }}</p>
      </div>
    </div>
    
    <div class="cart-btn">
      🛒 <span>{{ cartCount }}</span>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero" appGlow glowColor="#fdf2f8">
    <h2>Discover Your <br> <span>Natural Glow</span></h2>
    <p>Premium skincare crafted with nature's best ingredients.</p>
    <button class="cta-btn">Shop Collection</button>
  </section>

  <!-- Filters -->
  <section class="filters">
    <button *ngFor="let cat of categories" 
            [class.active]="cat === selectedCategory"
            (click)="filterByCategory(cat)">
      {{ cat }}
    </button>
  </section>

  <!-- Product Grid -->
  <section class="product-grid">
    <div class="product-card" *ngFor="let p of filteredProducts" appGlow>
      <div class="product-image">{{ p.image }}</div>
      
      <div class="product-info">
        <span class="category">{{ p.category }}</span>
        <h3>{{ p.name }}</h3>
        
        <!-- Pipe Demonstration: KebabCase (Slug) -->
        <p class="slug">/products/{{ p.name | kebabCase }}</p>
        
        <div class="bottom-row">
          <span class="price">{{ p.price | currency:'USD' }}</span>
          
          <div *ngIf="p.inStock; else outOfStock">
            <button class="buy-btn" (click)="addToCart(p.name)">Add to Cart</button>
          </div>
          <ng-template #outOfStock>
            <span class="sold-out">Sold Out</span>
          </ng-template>
        </div>
      </div>
    </div>
  </section>

</div>
